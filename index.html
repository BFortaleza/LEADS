<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE GESTIÓN DE LEADS | BANCO FORTALEZA</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background-color: #020617;
            overflow: hidden;
            color: white;
        }

        /* Fondo: Posicionado para mostrar la parte superior de la imagen */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to bottom, rgba(2, 6, 23, 0.4), rgba(2, 6, 23, 0.85)),
                url('https://i.ibb.co/sdSZJxNM/FONFO-LEADS.webp');
            background-size: cover;
            background-position: center 20%; 
            z-index: -1;
            transition: transform 0.6s ease-out;
            transform: scale(1);
        }

        /* Título con efecto de brillo elegante */
        .main-title {
            background: linear-gradient(
                to right, 
                #ffffff 20%, 
                #94a3b8 40%, 
                #ffffff 60%, 
                #94a3b8 80%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: textShine 4s linear infinite;
            letter-spacing: -0.01em;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        /* Estilo Liquid Glass - Tamaño compacto */
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            width: 230px; 
            height: 150px;
        }

        .liquid-glass:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 12px 25px -10px rgba(0, 0, 0, 0.4);
        }

        .icon-container {
            transition: all 0.4s ease;
            color: white; 
        }

        .btn-redes:hover .icon-container {
            color: #4ade80; 
            transform: scale(1.1);
        }

        .btn-campanas:hover .icon-container {
            color: #60a5fa; 
            transform: scale(1.1);
        }

        .stagger-1 { animation: slideUp 0.8s ease-out forwards; opacity: 0; }
        .stagger-2 { animation: slideUp 0.8s ease-out 0.2s forwards; opacity: 0; }
        .stagger-3 { animation: slideUp 0.8s ease-out 0.4s forwards; opacity: 0; }

        @keyframes slideUp {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .shine-effect {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.02), transparent);
            transition: all 0.6s;
        }

        .liquid-glass:hover .shine-effect {
            left: 100%;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <!-- Fondo -->
    <div class="background-container" id="bg"></div>

    <!-- Contenido Principal -->
    <main class="z-10 text-center w-full max-w-4xl px-6">
        
        <!-- Header con el título solicitado - Espaciado inferior aumentado -->
        <header class="mb-16 stagger-1">
            <h1 class="main-title text-2xl md:text-3xl font-extrabold mb-1 uppercase tracking-tight">
                SISTEMA DE GESTIÓN DE LEADS
            </h1>
            <div class="flex justify-center items-center gap-2">
                <div class="h-[1px] w-5 bg-white/20"></div>
                <span class="text-[8px] uppercase tracking-[0.6em] font-semibold text-white/30">Panel Administrativo</span>
                <div class="h-[1px] w-5 bg-white/20"></div>
            </div>
        </header>

        <!-- Botones Pequeños - Gap aumentado entre botones -->
        <div class="flex flex-col md:flex-row gap-10 justify-center items-center stagger-2">
            
            <!-- Botón 1 -->
            <button onclick="handleAction('redes')" class="liquid-glass btn-redes flex flex-col items-center justify-center group">
                <div class="shine-effect"></div>
                <div class="icon-container mb-2 p-3 rounded-full bg-white/5 border border-white/5 group-hover:bg-green-500/5 transition-all duration-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <span class="text-xs font-bold tracking-[0.15em] uppercase transition-all">Redes Sociales</span>
            </button>

            <!-- Botón 2 -->
            <button onclick="handleAction('campanas')" class="liquid-glass btn-campanas flex flex-col items-center justify-center group">
                <div class="shine-effect"></div>
                <div class="icon-container mb-2 p-3 rounded-full bg-white/5 border border-white/5 group-hover:bg-blue-500/5 transition-all duration-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
                    </svg>
                </div>
                <span class="text-xs font-bold tracking-[0.15em] uppercase transition-all text-center px-4">Campañas Permanentes</span>
            </button>

        </div>

        <!-- Footer - Espaciado superior aumentado -->
        <footer class="mt-20 stagger-3">
            <div class="inline-block px-3 py-1 rounded-full border border-white/5 bg-white/5">
                <p class="text-[7px] tracking-[0.3em] font-bold text-white/20 uppercase">
                    © 2025 BANCO FORTALEZA
                </p>
            </div>
        </footer>
    </main>

    <div id="toast" class="fixed top-5 right-5 bg-white/95 text-black px-4 py-2 rounded-lg font-bold shadow-2xl opacity-0 pointer-events-none transition-all duration-500 transform translate-x-5 text-[10px]"></div>

    <script>
        function handleAction(type) {
            const toast = document.getElementById('toast');
            toast.innerText = `Abriendo: ${type === 'redes' ? 'Redes Sociales' : 'Campañas'}...`;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(10px)';
            }, 2000);
        }

        // Efecto Parallax muy sutil
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 120;
            const y = (window.innerHeight / 2 - e.clientY) / 120;
            const bg = document.getElementById('bg');
            bg.style.transform = `scale(1) translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
