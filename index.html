<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE GESTIÓN DE LEADS | BANCO FORTALEZA</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background-color: #020617;
            overflow: hidden;
            color: white;
        }

        /* Fondo posicionado para mostrar la parte superior de la nueva imagen */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to bottom, rgba(2, 6, 23, 0.45), rgba(2, 6, 23, 0.9)),
                url('https://i.ibb.co/9kpPs8Sx/FONFO-LEADS2.webp');
            background-size: cover;
            background-position: center 10%; /* Enfocado en la parte superior */
            z-index: -1;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
            transform: scale(1);
        }

        /* Título con efecto de brillo metálico animado */
        .main-title {
            background: linear-gradient(
                to right, 
                #ffffff 20%, 
                #94a3b8 40%, 
                #ffffff 60%, 
                #94a3b8 80%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: textShine 5s linear infinite;
            letter-spacing: -0.01em;
            text-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        /* Estilo Liquid Glass Refinado */
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            position: relative;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Pantalla de Bloqueo con mayor margen superior para bajar el contenido */
        #login-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: flex-start; 
            justify-content: center;
            background: rgba(2, 6, 23, 0.6);
            backdrop-filter: blur(30px);
            transition: opacity 1s ease, visibility 1s;
            padding-top: 25vh; /* Se ha bajado significativamente */
        }

        .login-card {
            width: 360px;
            padding: 3.5rem 2.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .login-input {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 1.25rem;
            padding: 1rem;
            width: 100%;
            color: white;
            text-align: center;
            outline: none;
            transition: all 0.4s;
            font-size: 1.5rem;
            letter-spacing: 0.4em;
            font-weight: 800;
            text-transform: uppercase;
        }

        .login-input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* Botones del Sistema */
        .btn-system {
            width: 300px; 
            height: 200px;
        }

        .btn-system:hover {
            transform: translateY(-12px) scale(1.04);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7);
        }

        .icon-container {
            transition: all 0.5s ease;
            color: white; 
        }

        .btn-redes:hover .icon-container {
            color: #4ade80; 
            transform: scale(1.15) rotate(-3deg);
        }

        .btn-campanas:hover .icon-container {
            color: #60a5fa; 
            transform: scale(1.15) rotate(3deg);
        }

        /* Animaciones de entrada */
        .stagger-1 { animation: slideUp 1s ease-out forwards; opacity: 0; }
        .stagger-2 { animation: slideUp 1s ease-out 0.2s forwards; opacity: 0; }
        .stagger-3 { animation: slideUp 1s ease-out 0.4s forwards; opacity: 0; }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .shine-effect {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.03), transparent);
            transition: all 0.7s;
        }

        .btn-system:hover .shine-effect {
            left: 100%;
        }

        .hidden-system {
            display: none !important;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen pt-[25vh]"> <!-- Contenido principal desplazado hacia abajo -->

    <!-- Fondo de Pantalla -->
    <div class="background-container" id="bg"></div>

    <!-- Pantalla de Bloqueo (Login) -->
    <div id="login-overlay">
        <div class="liquid-glass login-card stagger-1">
            <div class="mb-8">
                <div class="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-white/10 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white/80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-extrabold uppercase tracking-[0.3em] mb-2">Seguridad</h2>
                <p class="text-[11px] text-white/30 uppercase tracking-[0.5em] font-semibold">Banco Fortaleza</p>
            </div>
            
            <div class="relative group">
                <input type="password" id="pass-input" class="login-input" placeholder="•••••" maxlength="5" autofocus>
            </div>
            
            <p id="login-error" class="text-red-400 text-[10px] mt-5 uppercase tracking-[0.2em] font-bold opacity-0 transition-opacity">Acceso Denegado</p>
            
            <button id="btn-verify" onclick="checkPassword()" class="mt-8 w-full py-4 bg-white/5 hover:bg-white/15 border border-white/10 rounded-2xl text-xs font-bold uppercase tracking-[0.4em] transition-all duration-300">
                Verificar
            </button>
        </div>
    </div>

    <!-- Contenido Principal -->
    <main id="main-content" class="z-10 text-center w-full max-w-5xl px-6 hidden-system">
        <!-- Header -->
        <header class="mb-20 stagger-1">
            <h1 class="main-title text-4xl md:text-6xl font-extrabold mb-3 uppercase tracking-tight">
                SISTEMA DE GESTIÓN DE LEADS
            </h1>
            <div class="flex justify-center items-center gap-4">
                <div class="h-[1px] w-12 bg-white/10"></div>
                <span class="text-[10px] md:text-xs uppercase tracking-[0.6em] font-semibold text-white/40">Panel Administrativo</span>
                <div class="h-[1px] w-12 bg-white/10"></div>
            </div>
        </header>

        <!-- Botones -->
        <div class="flex flex-col md:flex-row gap-12 justify-center items-center stagger-2">
            <!-- Botón 1 -->
            <button onclick="handleAction('redes')" class="liquid-glass btn-system btn-redes flex flex-col items-center justify-center group">
                <div class="shine-effect"></div>
                <div class="icon-container mb-5 p-5 rounded-full bg-white/5 border border-white/5 group-hover:bg-green-500/10 transition-all duration-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <span class="text-base md:text-lg font-bold tracking-[0.2em] uppercase transition-all">Redes Sociales</span>
            </button>

            <!-- Botón 2 -->
            <button onclick="handleAction('campanas')" class="liquid-glass btn-system btn-campanas flex flex-col items-center justify-center group">
                <div class="shine-effect"></div>
                <div class="icon-container mb-5 p-5 rounded-full bg-white/5 border border-white/5 group-hover:bg-blue-500/10 transition-all duration-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
                    </svg>
                </div>
                <span class="text-base md:text-lg font-bold tracking-[0.2em] uppercase transition-all text-center px-6">Campañas Permanentes</span>
            </button>
        </div>

        <!-- Footer -->
        <footer class="mt-24 stagger-3">
            <div class="inline-block px-5 py-2.5 rounded-full border border-white/5 bg-white/5 backdrop-blur-md">
                <p class="text-[9px] md:text-[11px] tracking-[0.5em] font-bold text-white/30 uppercase">
                    © 2025 BANCO FORTALEZA
                </p>
            </div>
        </footer>
    </main>

    <div id="toast" class="fixed top-10 right-10 bg-white/95 text-black px-8 py-4 rounded-2xl font-bold shadow-2xl opacity-0 pointer-events-none transition-all duration-700 transform translate-x-10 text-sm"></div>

    <script>
        // PIN: FOR25
        const EXPECTED_ACCESS = "Rk9SMjU=";

        function checkPassword() {
            const inputRaw = document.getElementById('pass-input').value;
            const input = inputRaw.trim().toUpperCase(); 
            const errorMsg = document.getElementById('login-error');
            const overlay = document.getElementById('login-overlay');
            const mainContent = document.getElementById('main-content');
            
            if (btoa(input) === EXPECTED_ACCESS) {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.visibility = 'hidden';
                    mainContent.classList.remove('hidden-system');
                }, 1000);
            } else {
                errorMsg.style.opacity = '1';
                document.getElementById('pass-input').value = '';
                const card = document.querySelector('.login-card');
                card.style.transform = 'translateX(10px)';
                setTimeout(() => card.style.transform = 'translateX(-10px)', 100);
                setTimeout(() => card.style.transform = 'translateX(0)', 200);
                setTimeout(() => { errorMsg.style.opacity = '0'; }, 2000);
            }
        }

        document.getElementById('pass-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPassword();
        });

        function handleAction(type) {
            const toast = document.getElementById('toast');
            let url = "";
            
            if (type === 'redes') {
                url = "https://docs.google.com/spreadsheets/d/1j8gG1L5aQ5KvkskaTwJX9doUlAr6zijmiMhpfSdiHVY/edit?usp=sharing";
                toast.innerHTML = `<div class="flex items-center gap-3"><div class="w-2 h-2 rounded-full animate-ping bg-green-500"></div>Abriendo base de datos: Redes Sociales</div>`;
            } else {
                url = "https://docs.google.com/spreadsheets/d/1sQDlZgtiPyoJB_DAXOu3ef9mPKTnZ37AVUd79ZPA0pM/edit?usp=sharing";
                toast.innerHTML = `<div class="flex items-center gap-3"><div class="w-2 h-2 rounded-full animate-ping bg-blue-500"></div>Abriendo base de datos: Campañas</div>`;
            }
            
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                window.open(url, '_blank');
            }, 1200);
        }

        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 100;
            const y = (window.innerHeight / 2 - e.clientY) / 100;
            const bg = document.getElementById('bg');
            if(bg) bg.style.transform = `scale(1.02) translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
