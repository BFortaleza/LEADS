<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE GESTIÓN DE LEADS | BANCO FORTALEZA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.15); /* Transparencia base reducida */
            --glass-border: rgba(255, 255, 255, 0.06);
            --brand-blue: #3b82f6;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: white;
            overflow: hidden; /* Evita el scroll para mantener proporción 16:9 */
            height: 100vh;
        }

        /* Grano Cinematográfico */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.03;
            pointer-events: none;
            z-index: 60;
        }

        .bg-portal {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
            z-index: -2;
        }

        .bg-image {
            position: fixed;
            inset: 0;
            background-image: url('https://i.ibb.co/9kpPs8Sx/FONFO-LEADS2.webp');
            background-size: cover;
            background-position: center;
            opacity: 0.22;
            filter: blur(4px) scale(1.05);
            z-index: -1;
            transition: transform 0.4s ease-out;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.4);
        }

        .main-title {
            background: linear-gradient(to bottom, #ffffff 40%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.03em;
        }

        .action-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        
        .action-card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.03);
        }

        .auth-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.75rem;
            padding: 0.85rem;
            width: 100%;
            color: white;
            text-align: center;
            outline: none;
            transition: all 0.4s;
            font-size: 1.15rem;
            letter-spacing: 0.4em;
            font-weight: 800;
            text-transform: uppercase;
        }

        .pin-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pin-dot.active {
            background: white;
            box-shadow: 0 0 12px white;
            border-color: white;
            transform: scale(1.15);
        }

        .hidden-content { display: none !important; }
        #system-loader { display: none; }

        @keyframes pulse-logo {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(255,255,255,0)); }
            50% { filter: drop-shadow(0 0 20px rgba(255,255,255,0.15)); }
        }
        .logo-glow { animation: pulse-logo 3s infinite; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

    <div class="bg-portal"></div>
    <div class="bg-image" id="bg-image"></div>

    <!-- PANTALLA DE ACCESO -->
    <div id="auth-screen" class="z-50 w-full max-w-sm px-6 transition-all duration-700">
        <div class="glass-panel rounded-[2rem] p-8 text-center relative overflow-hidden">
            <div class="mb-6">
                <img src="https://i.ibb.co/8yB0N1b/logo-blanco.png" alt="Banco Fortaleza" class="h-10 mx-auto mb-6 logo-glow">
                <h2 class="text-base font-bold tracking-[0.3em] uppercase opacity-90">Autorización</h2>
                <p class="text-white/30 text-[8px] tracking-[0.5em] mt-2 font-bold uppercase">Terminal Segura</p>
            </div>

            <div class="flex justify-center gap-3 mb-6">
                <div class="pin-dot" id="dot-0"></div>
                <div class="pin-dot" id="dot-1"></div>
                <div class="pin-dot" id="dot-2"></div>
                <div class="pin-dot" id="dot-3"></div>
                <div class="pin-dot" id="dot-4"></div>
            </div>

            <div class="relative max-w-[240px] mx-auto mb-6">
                <input type="password" id="pin-input" class="auth-input" maxlength="5" placeholder="•••••" autofocus>
            </div>

            <button onclick="verifyPin()" class="w-full py-3.5 bg-white/5 hover:bg-white/10 border border-white/5 rounded-xl text-[9px] font-black uppercase tracking-[0.5em] transition-all">
                Verificar Identidad
            </button>
            <p id="auth-error" class="text-red-500 text-[9px] mt-4 font-bold uppercase tracking-widest opacity-0 transition-opacity">Credencial Inválida</p>
        </div>
    </div>

    <!-- LOADER -->
    <div id="system-loader" class="z-50 flex flex-col items-center">
        <div class="w-12 h-12 border-2 border-white/5 border-t-white rounded-full animate-spin mb-4"></div>
        <p class="text-white/30 font-mono text-[8px] tracking-[0.6em] animate-pulse uppercase">Conectando...</p>
    </div>

    <!-- DASHBOARD PRINCIPAL -->
    <main id="dashboard" class="z-10 w-full h-screen flex flex-col hidden-content">
        <!-- Barra de Navegación (Máxima Transparencia) -->
        <nav class="w-full px-8 py-3 flex justify-between items-center border-b border-white/5 bg-white/[0.02] backdrop-blur-md sticky top-0 z-40">
            <div class="flex items-center gap-6">
                <img src="https://i.ibb.co/8yB0N1b/logo-blanco.png" alt="Logo" class="h-6">
                <div class="h-4 w-[1px] bg-white/10 hidden sm:block"></div>
                <div class="hidden sm:block">
                    <p id="real-time-clock" class="text-[10px] font-bold tracking-widest text-white/60">00:00:00</p>
                    <p id="real-time-date" class="text-[7px] text-white/20 uppercase tracking-[0.2em]">Cargando...</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="text-right hidden md:block">
                    <p class="text-[8px] text-white/40 uppercase tracking-widest font-bold">Estado</p>
                    <p class="text-[9px] text-green-400 font-bold flex items-center justify-end gap-1.5">
                        <span class="w-1 h-1 bg-green-500 rounded-full animate-pulse"></span> SESIÓN ACTIVA
                    </p>
                </div>
                <button onclick="logout()" class="ml-2 p-2 bg-white/5 hover:bg-red-500/10 rounded-lg transition-all border border-white/5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white/30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
        </nav>

        <!-- Contenido Central (Ajustado para 16:9 sin scroll) -->
        <div class="flex-1 flex flex-col items-center justify-center px-6 py-4 overflow-hidden">
            <header class="text-center mb-10">
                <h1 class="main-title text-4xl md:text-5xl lg:text-6xl font-extrabold mb-3 uppercase tracking-tighter">
                    SISTEMA DE GESTIÓN DE LEADS
                </h1>
                <div class="flex justify-center items-center gap-4 opacity-40">
                    <div class="h-[1px] w-8 bg-white/40"></div>
                    <span class="text-[10px] uppercase tracking-[0.8em] font-semibold">Panel Administrativo</span>
                    <div class="h-[1px] w-8 bg-white/40"></div>
                </div>
            </header>

            <!-- Grid de Módulos (Más compactos) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl px-4">
                <button onclick="openLink('redes')" class="action-card glass-panel p-8 rounded-[1.5rem] flex flex-col items-center group">
                    <div class="w-12 h-12 rounded-xl bg-white/5 border border-white/5 flex items-center justify-center mb-6 group-hover:bg-green-500/10 group-hover:border-green-500/30 transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white group-hover:text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <h3 class="text-base font-bold tracking-[0.1em] uppercase">Leads Redes Sociales</h3>
                    <p class="text-[8px] text-white/20 mt-2 uppercase tracking-[0.3em] font-bold">Base de Datos Centralizada</p>
                </button>

                <button onclick="openLink('campanas')" class="action-card glass-panel p-8 rounded-[1.5rem] flex flex-col items-center group">
                    <div class="w-12 h-12 rounded-xl bg-white/5 border border-white/5 flex items-center justify-center mb-6 group-hover:bg-blue-500/10 group-hover:border-blue-500/30 transition-all duration-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white group-hover:text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
                        </svg>
                    </div>
                    <h3 class="text-base font-bold tracking-[0.1em] uppercase">Leads Campañas</h3>
                    <p class="text-[8px] text-white/20 mt-2 uppercase tracking-[0.3em] font-bold">Análisis de Resultados</p>
                </button>
            </div>
        </div>

        <!-- Footer solicitado -->
        <footer class="py-6 text-center">
            <div class="flex flex-col items-center gap-1 opacity-40">
                <p class="text-[10px] tracking-[0.5em] font-bold uppercase text-white/80">
                    BANCO FORTALEZA SA
                </p>
                <p class="text-[7px] tracking-[0.3em] font-medium uppercase text-white/40">
                    TODOS LOS DERECHOS RESERVADOS
                </p>
            </div>
        </footer>
    </main>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-8 right-8 z-[100] glass-panel px-6 py-4 rounded-2xl border-l-4 border-l-blue-500 transform translate-x-10 opacity-0 transition-all duration-500 shadow-2xl">
        <div class="flex items-center gap-4">
            <div id="toast-spinner" class="w-4 h-4 border-2 border-white/10 border-t-white rounded-full animate-spin"></div>
            <div>
                <p id="toast-title" class="text-[9px] font-black uppercase tracking-widest"></p>
                <p id="toast-body" class="text-[7px] text-white/40 uppercase tracking-widest font-bold mt-0.5"></p>
            </div>
        </div>
    </div>

    <script>
        const pinInput = document.getElementById('pin-input');
        const CORRECT_HASH = "FOR25";

        window.onload = () => {
            if (sessionStorage.getItem('fortaleza_session') === 'active') {
                showDashboard(false);
            }
            updateClock();
            setInterval(updateClock, 1000);
            pinInput.focus();
        };

        function updateClock() {
            const now = new Date();
            const clock = document.getElementById('real-time-clock');
            const dateEl = document.getElementById('real-time-date');
            
            clock.textContent = now.toLocaleTimeString('es-BO', { hour12: false });
            dateEl.textContent = now.toLocaleDateString('es-BO', { 
                day: '2-digit', 
                month: '2-digit', 
                year: 'numeric' 
            });
        }

        pinInput.addEventListener('input', (e) => {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, i) => {
                if (i < e.target.value.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        });

        pinInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyPin();
        });

        function verifyPin() {
            const val = pinInput.value.trim().toUpperCase();
            const error = document.getElementById('auth-error');
            
            if (val === CORRECT_HASH) {
                showDashboard(true);
            } else {
                error.style.opacity = '1';
                pinInput.value = "";
                document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('active'));
                const card = document.querySelector('#auth-screen .glass-panel');
                card.style.transform = 'translateX(8px)';
                setTimeout(() => card.style.transform = 'translateX(-8px)', 80);
                setTimeout(() => card.style.transform = 'translateX(0)', 160);
                setTimeout(() => error.style.opacity = '0', 2000);
            }
        }

        function showDashboard(animated) {
            const auth = document.getElementById('auth-screen');
            const loader = document.getElementById('system-loader');
            const dashboard = document.getElementById('dashboard');

            auth.style.opacity = '0';
            auth.style.transform = 'translateY(-15px)';
            
            setTimeout(() => {
                auth.classList.add('hidden-content');
                if (animated) {
                    loader.style.display = 'flex';
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => {
                            loader.style.display = 'none';
                            dashboard.classList.remove('hidden-content');
                            sessionStorage.setItem('fortaleza_session', 'active');
                        }, 300);
                    }, 600);
                } else {
                    dashboard.classList.remove('hidden-content');
                }
            }, 300);
        }

        function logout() {
            sessionStorage.removeItem('fortaleza_session');
            location.reload();
        }

        function openLink(type) {
            let url = type === 'redes' 
                ? "https://docs.google.com/spreadsheets/d/1j8gG1L5aQ5KvkskaTwJX9doUlAr6zijmiMhpfSdiHVY/edit?usp=sharing"
                : "https://docs.google.com/spreadsheets/d/1sQDlZgtiPyoJB_DAXOu3ef9mPKTnZ37AVUd79ZPA0pM/edit?usp=sharing";
            
            showToast(
                type === 'redes' ? 'Acceso Redes' : 'Acceso Campañas',
                'Estableciendo enlace...',
                type === 'redes' ? '#4ade80' : '#3b82f6'
            );

            setTimeout(() => {
                window.open(url, '_blank');
            }, 600);
        }

        function showToast(title, body, color) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-body').innerText = body;
            toast.style.borderLeftColor = color;
            
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
            }, 2500);
        }

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) / 100;
            const y = (e.clientY - window.innerHeight / 2) / 100;
            const bg = document.getElementById('bg-image');
            if (bg) bg.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
